<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Pro</title>

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- Botão tema -->
    <button id="temaBtn">
        🌙 Modo Escuro
    </button>

    <!-- Container principal -->
    <div class="container">

        <!-- Cabeçalho -->
        <header>
            <h1>Pokédex</h1>

            <div class="pesquisa">
                <input
                    type="text"
                    id="pokemonInput"
                    placeholder="Digite nome ou número">

                <button id="buscarBtn">
                    Buscar
                </button>
            </div>
        </header>

        <!-- Card principal -->
        <section class="pokemon-card">

            <img
                id="pokemonImg"
                src=""
                alt="Pokemon">

            <h2 id="pokemonNome">
                Carregando...
            </h2>

            <p>
                Nº
                <span id="pokemonId"></span>
            </p>

            <!-- Tipos -->
            <div id="tipos"></div>

            <!-- Informações -->
            <div class="informacoes">

                <div class="info-box">
                    <h3>Altura</h3>
                    <p id="altura">0</p>
                </div>

                <div class="info-box">
                    <h3>Peso</h3>
                    <p id="peso">0</p>
                </div>

            </div>

            <!-- Habilidades -->
            <div class="habilidades">

                <h3>Habilidades</h3>

                <ul id="habilidades">
                </ul>

            </div>

        </section>

        <!-- Estatísticas -->
        <section class="stats">

            <h2>Estatísticas</h2>

            <div id="statsContainer">

            </div>

        </section>

        <!-- Navegação -->
        <section class="navegacao">

            <button id="anteriorBtn">
                ⬅ Anterior
            </button>

            <button id="proximoBtn">
                Próximo ➡
            </button>

        </section>

        <!-- Favoritos -->
        <section class="favoritos">

            <h2>⭐ Favoritos</h2>

            <div id="favoritosLista">

            </div>

        </section>

        <!-- Lista dos Pokémon -->
        <section class="lista-pokemon">

            <h2>Lista Pokémon</h2>

            <div id="listaPokemon">

            </div>

        </section>

    </div>

    <!-- Modal -->
    <div id="modal" class="modal">

        <div class="modal-content">

            <span id="fecharModal">
                &times;
            </span>

            <h2 id="modalNome"></h2>

            <img id="modalImagem">

            <div id="modalConteudo">

            </div>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
